<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>СвятоЛаб — Адмін панель</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Paytone+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: #f5f0fa;
    color: #1e1a2f;
    padding-bottom: 20px;
  }

  :root {
    --purple: #7b2cbf;
    --purple-dark: #4a0e78;
    --pink: #ff5c8a;
    --gold: #ffcd3c;
    --green: #06d6a0;
    --orange: #ff9f1c;
    --shadow-sm: 0 8px 24px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 12px 32px rgba(123, 44, 191, 0.12);
  }

  /* ШАПКА */
  .admin-header {
    background: radial-gradient(circle at 10% 30%, #6a1b9a, #3c096c, #1a0b2e);
    padding: 30px 24px;
    text-align: center;
    border-bottom-left-radius: 48px;
    border-bottom-right-radius: 48px;
  }

  .admin-header h1 {
    font-family: 'Paytone One', sans-serif;
    font-size: 48px;
    background: linear-gradient(135deg, #FFE6B0, #FFD966, #FFB347);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .admin-header p {
    color: #fff9e8;
    margin-top: 8px;
  }

  .header-buttons {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .back-home, .go-to-site {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    color: white;
    padding: 8px 24px;
    border-radius: 60px;
    text-decoration: none;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
    border: none;
    font-family: 'Nunito', sans-serif;
  }

  .go-to-site {
    background: linear-gradient(135deg, #f58529, #dd2a7b);
  }

  .back-home:hover, .go-to-site:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.3);
  }

  /* ОСНОВНИЙ КОНТЕЙНЕР */
  .admin-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  /* ФОРМА ДОДАВАННЯ ТОВАРУ */
  .add-product-form {
    background: white;
    border-radius: 40px;
    padding: 28px;
    margin-bottom: 32px;
    box-shadow: var(--shadow-md);
  }

  .form-title {
    font-family: 'Paytone One', sans-serif;
    font-size: 28px;
    color: var(--purple-dark);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-group label {
    font-weight: 800;
    color: var(--purple-dark);
    font-size: 14px;
  }

  .form-group input, .form-group select, .form-group textarea {
    padding: 12px 16px;
    border: 2px solid #f0e6f5;
    border-radius: 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    transition: 0.2s;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--purple);
  }

  .form-group textarea {
    resize: vertical;
    min-height: 80px;
  }

  .full-width {
    grid-column: 1 / -1;
  }

  .checkbox-group {
    flex-direction: row;
    align-items: center;
    gap: 12px;
  }

  .checkbox-group input {
    width: 20px;
    height: 20px;
    cursor: pointer;
  }

  .image-preview {
    width: 100px;
    height: 100px;
    background: #f5f0fa;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    margin-top: 8px;
    border: 2px dashed #ddd;
    overflow: hidden;
  }

  .image-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .image-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .image-tab {
    padding: 6px 14px;
    background: #f0e9fa;
    border-radius: 40px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: 0.2s;
  }

  .image-tab.active {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white;
  }

  .btn-submit {
    background: linear-gradient(135deg, var(--green), #00b4d8);
    color: white;
    font-weight: 900;
    font-size: 16px;
    padding: 14px 32px;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 16px;
    width: 100%;
  }

  .btn-submit:hover {
    transform: scale(1.02);
    box-shadow: 0 8px 20px rgba(6,214,160,0.3);
  }

  /* СПИСОК ТОВАРІВ */
  .products-list {
    background: white;
    border-radius: 40px;
    padding: 28px;
    box-shadow: var(--shadow-md);
  }

  .products-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .products-header h2 {
    font-family: 'Paytone One', sans-serif;
    font-size: 28px;
    color: var(--purple-dark);
  }

  .search-admin {
    display: flex;
    gap: 12px;
    background: #f5f0fa;
    padding: 6px 12px;
    border-radius: 60px;
  }

  .search-admin input {
    border: none;
    background: transparent;
    padding: 8px 12px;
    width: 200px;
    outline: none;
  }

  .search-admin button {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border: none;
    color: white;
    padding: 8px 20px;
    border-radius: 60px;
    cursor: pointer;
  }

  /* ТАБЛИЦЯ ТОВАРІВ */
  .products-table {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 16px 12px;
    text-align: left;
    border-bottom: 1px solid #f0e6f5;
  }

  th {
    background: #f9f5ff;
    font-weight: 800;
    color: var(--purple-dark);
  }

  .product-image-cell {
    width: 70px;
  }

  .product-image-cell img {
    width: 50px;
    height: 50px;
    object-fit: cover;
    border-radius: 12px;
  }

  .product-emoji {
    font-size: 40px;
  }

  .product-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .edit-btn, .delete-btn {
    padding: 8px 16px;
    border-radius: 40px;
    border: none;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
  }

  .edit-btn {
    background: #f0e9fa;
    color: var(--purple);
  }

  .delete-btn {
    background: #ffe8f0;
    color: #ff5c8a;
  }

  .edit-btn:hover, .delete-btn:hover {
    transform: scale(1.05);
  }

  .hit-badge {
    background: linear-gradient(135deg, var(--gold), var(--orange));
    color: #4a0e78;
    padding: 4px 12px;
    border-radius: 40px;
    font-size: 12px;
    font-weight: 800;
    display: inline-block;
  }

  .sale-badge {
    background: linear-gradient(135deg, #ff5c8a, #ff2d6e);
    color: white;
    padding: 4px 12px;
    border-radius: 40px;
    font-size: 12px;
    font-weight: 800;
    display: inline-block;
  }

  /* МОДАЛЬНЕ ВІКНО РЕДАГУВАННЯ */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(5px);
  }

  .modal.active {
    display: flex;
  }

  .modal-content {
    background: white;
    border-radius: 48px;
    max-width: 650px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 32px;
    position: relative;
  }

  .modal-close {
    position: sticky;
    top: 0;
    float: right;
    font-size: 28px;
    cursor: pointer;
    background: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-title {
    font-family: 'Paytone One', sans-serif;
    font-size: 28px;
    color: var(--purple-dark);
    margin: 16px 0 24px;
  }

  .modal-form-group {
    margin-bottom: 16px;
  }

  .modal-form-group label {
    display: block;
    font-weight: 800;
    margin-bottom: 6px;
    color: var(--purple-dark);
  }

  .modal-form-group input, .modal-form-group select, .modal-form-group textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #f0e6f5;
    border-radius: 20px;
    font-family: 'Nunito', sans-serif;
  }

  .modal-save-btn {
    background: linear-gradient(135deg, var(--green), #00b4d8);
    color: white;
    font-weight: 800;
    padding: 14px;
    border: none;
    border-radius: 60px;
    width: 100%;
    cursor: pointer;
    margin-top: 16px;
  }

  .empty-state {
    text-align: center;
    padding: 48px;
    color: #aaa;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: linear-gradient(135deg, var(--green), #00b4d8);
    color: white;
    padding: 12px 24px;
    border-radius: 60px;
    font-weight: 700;
    z-index: 1001;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ЛОГІН МОДАЛКА */
  .login-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: white;
    border-radius: 48px;
    padding: 40px;
    text-align: center;
    max-width: 400px;
    width: 90%;
  }
  .login-box h2 {
    font-family: 'Paytone One', sans-serif;
    margin-bottom: 24px;
    color: var(--purple-dark);
  }
  .login-box input {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border: 2px solid #f0e6f5;
    border-radius: 60px;
    font-size: 16px;
    text-align: center;
  }
  .login-btn {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white;
    border: none;
    padding: 14px;
    border-radius: 60px;
    font-weight: 800;
    width: 100%;
    cursor: pointer;
  }
  .error-msg {
    color: #ff5c8a;
    margin-top: 12px;
    font-size: 14px;
  }

  @media (max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    th, td { font-size: 12px; padding: 10px 6px; }
    .product-actions { flex-direction: column; gap: 6px; }
  }
</style>
</head>
<body>

<div class="admin-header">
  <h1><i class="fas fa-user-shield"></i> СвятоЛаб Адмін</h1>
  <p>Керування товарами: додавання, редагування, видалення</p>
  <div class="header-buttons">
    <button class="go-to-site" id="goToSiteBtn"><i class="fas fa-globe"></i> На головну сайту</button>
    <button class="back-home" id="backHomeBtn"><i class="fas fa-arrow-left"></i> Назад</button>
  </div>
</div>

<div class="admin-container" id="adminContainer" style="display: none;">
  <!-- ФОРМА ДОДАВАННЯ ТОВАРУ -->
  <div class="add-product-form">
    <div class="form-title">
      <i class="fas fa-plus-circle" style="color: var(--green);"></i>
      Додати новий товар
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label><i class="fas fa-image"></i> Зображення (емодзі)</label>
        <input type="text" id="newEmoji" placeholder="Введіть емодзі (наприклад: 🎈)" value="🎁">
      </div>
      <div class="form-group">
        <label><i class="fas fa-tag"></i> Назва товару *</label>
        <input type="text" id="newName" placeholder="Введіть назву">
      </div>
      <div class="form-group">
        <label><i class="fas fa-dollar-sign"></i> Звичайна ціна (грн) *</label>
        <input type="number" id="newPrice" placeholder="Ціна">
      </div>
      <div class="form-group">
        <label><i class="fas fa-percent"></i> Акційна ціна (грн)</label>
        <input type="number" id="newOldPrice" placeholder="Залиште порожнім, якщо немає акції">
      </div>
      <div class="form-group">
        <label><i class="fas fa-list"></i> Категорія</label>
        <select id="newCategory">
          <option value="costumes">🦸 Костюми</option>
          <option value="gifts">🎁 Подарунки</option>
          <option value="birthday">🎂 День народження</option>
          <option value="decor">🎊 Декор</option>
          <option value="edible">🍬 Їстівні букети</option>
          <option value="balloons">🎈 Шари</option>
        </select>
      </div>
      <div class="form-group checkbox-group">
        <label><i class="fas fa-fire"></i> Хіт продажу</label>
        <input type="checkbox" id="newIsHit">
      </div>
      <div class="form-group full-width">
        <label><i class="fas fa-align-left"></i> Опис товару</label>
        <textarea id="newDescription" rows="3" placeholder="Детальний опис товару..."></textarea>
      </div>
      <div class="form-group full-width">
        <label><i class="fas fa-list-ul"></i> Характеристики (через кому)</label>
        <textarea id="newFeatures" rows="2" placeholder="Наприклад: Висока якість, 50 кульок, Яскраві кольори"></textarea>
      </div>
    </div>
    <button class="btn-submit" id="addProductBtn">
      <i class="fas fa-plus"></i> Додати товар
    </button>
  </div>

  <!-- СПИСОК ТОВАРІВ -->
  <div class="products-list">
    <div class="products-header">
      <h2><i class="fas fa-boxes"></i> Всі товари</h2>
      <div class="search-admin">
        <input type="text" id="searchProducts" placeholder="Пошук за назвою...">
        <button id="searchBtn"><i class="fas fa-search"></i></button>
      </div>
    </div>
    <div class="products-table">
      <table id="productsTable">
        <thead>
          <tr><th>Фото</th><th>Назва</th><th>Ціна</th><th>Акція</th><th>Категорія</th><th>Хіт</th><th>Дії</th></tr>
        </thead>
        <tbody id="productsTableBody">
          <tr><td colspan="7" class="empty-state">Завантаження...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- МОДАЛЬНЕ ВІКНО РЕДАГУВАННЯ -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <div class="modal-close">&times;</div>
    <div class="modal-title"><i class="fas fa-edit"></i> Редагування товару</div>
    <div id="editFormContainer"></div>
  </div>
</div>

<script>
  // ========== ПОЧАТКОВІ ТОВАРИ ==========
  let products = [
    { id: 1, name: "Костюм Супергероя", price: 350, oldPrice: null, emoji: "🦸", category: "costumes", isHit: true, description: "Костюм супергероя для дітей та дорослих. Розміри S-XXL. Оренда на 1 день.", features: ["Розміри S-XXL", "Оренда", "Маска в комплекті"] },
    { id: 2, name: "Костюм Принцеси", price: 320, oldPrice: null, emoji: "👸", category: "costumes", isHit: false, description: "Чарівний костюм принцеси. Пишна спідниця, корона в комплекті.", features: ["Корона", "Пишна спідниця", "Оренда"] },
    { id: 3, name: "Подарункова коробка преміум", price: 79, oldPrice: 129, emoji: "📦", category: "gifts", isHit: true, description: "Елегантна подарункова коробка з кришкою. Підходить для будь-якого подарунка.", features: ["З кришкою", "Стрічка в комплекті"] },
    { id: 4, name: "Набір кульок 'Веселка'", price: 129, oldPrice: 179, emoji: "🎈", category: "balloons", isHit: true, description: "Яскравий набір із 50 кульок різних кольорів.", features: ["50 кульок", "10 кольорів"] },
    { id: 5, name: "Їстівний букет з полуниці", price: 450, oldPrice: 599, emoji: "🍓", category: "edible", isHit: true, description: "Смачний букет із полуниці в шоколаді.", features: ["Полуниця", "Білий шоколад"] },
    { id: 6, name: "Гірлянда 'Вечірка'", price: 89, oldPrice: null, emoji: "🎊", category: "decor", isHit: false, description: "Гірлянда довжиною 3 метри. Святкові прапорці.", features: ["3 метри", "12 прапорців"] }
  ];

  let isLoggedIn = false;

  // Завантаження/збереження
  function loadProducts() {
    const saved = localStorage.getItem('svyatolab_products');
    if (saved) {
      products = JSON.parse(saved);
    } else {
      saveProducts();
    }
  }

  function saveProducts() {
    localStorage.setItem('svyatolab_products', JSON.stringify(products));
  }

  function showToast(message, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = isError ? 'linear-gradient(135deg, #ff5c8a, #ff2d6e)' : 'linear-gradient(135deg, #06d6a0, #00b4d8)';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  // Відображення фото
  function renderProductImage(product) {
    if (product.emoji) {
      return `<span style="font-size:40px;">${product.emoji}</span>`;
    }
    return `<span style="font-size:40px;">🎁</span>`;
  }

  function getCategoryName(category) {
    const names = {
      'costumes': '🦸 Костюми',
      'gifts': '🎁 Подарунки',
      'birthday': '🎂 День народження',
      'decor': '🎊 Декор',
      'edible': '🍬 Їстівні букети',
      'balloons': '🎈 Шари'
    };
    return names[category] || category;
  }

  // Рендер таблиці
  let searchQuery = '';
  function renderProductsTable() {
    const tbody = document.getElementById('productsTableBody');
    if (!tbody) return;
    
    let filtered = products.filter(p => 
      p.name.toLowerCase().includes(searchQuery.toLowerCase())
    );
    
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state">📦 Немає товарів. Додайте перший!</td></tr>';
      return;
    }
    
    tbody.innerHTML = filtered.map(p => `
      <tr>
        <td class="product-image-cell">${renderProductImage(p)}</td>
        <td><strong>${p.name}</strong><br><small style="color:#888;">${p.description ? p.description.substring(0, 40) + '...' : 'Немає опису'}</small></td>
        <td><strong>${p.price} грн</strong></td>
        <td>${p.oldPrice ? `<span class="sale-badge">-${Math.round((1 - p.price/p.oldPrice)*100)}%</span><br><span style="font-size:12px; text-decoration:line-through;">${p.oldPrice} грн</span>` : '-'}</td>
        <td>${getCategoryName(p.category)}</td>
        <td>${p.isHit ? '<span class="hit-badge">🔥 Хіт</span>' : '-'}</td>
        <td class="product-actions">
          <button class="edit-btn" data-id="${p.id}"><i class="fas fa-edit"></i> Ред.</button>
          <button class="delete-btn" data-id="${p.id}"><i class="fas fa-trash"></i> Вид.</button>
        </td>
      </tr>
    `).join('');
    
    document.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', () => openEditModal(parseInt(btn.dataset.id)));
    });
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (confirm('Видалити товар?')) {
          products = products.filter(p => p.id !== parseInt(btn.dataset.id));
          saveProducts();
          renderProductsTable();
          showToast('Товар видалено');
        }
      });
    });
  }

  // Додавання товару
  function addProduct() {
    const emoji = document.getElementById('newEmoji').value || '🎁';
    const name = document.getElementById('newName').value;
    const price = parseInt(document.getElementById('newPrice').value);
    const oldPrice = document.getElementById('newOldPrice').value ? parseInt(document.getElementById('newOldPrice').value) : null;
    const category = document.getElementById('newCategory').value;
    const isHit = document.getElementById('newIsHit').checked;
    const description = document.getElementById('newDescription').value;
    const featuresStr = document.getElementById('newFeatures').value;
    
    if (!name || !price) {
      showToast('Будь ласка, заповніть назву та ціну', true);
      return;
    }
    
    const newId = Math.max(...products.map(p => p.id), 0) + 1;
    const newProduct = {
      id: newId,
      name: name,
      price: price,
      oldPrice: oldPrice,
      emoji: emoji,
      category: category,
      isHit: isHit,
      description: description || 'Святковий товар високої якості. Деталі уточнюйте в Instagram.',
      features: featuresStr ? featuresStr.split(',').map(f => f.trim()).filter(f => f) : []
    };
    
    products.push(newProduct);
    saveProducts();
    renderProductsTable();
    
    document.getElementById('newName').value = '';
    document.getElementById('newPrice').value = '';
    document.getElementById('newOldPrice').value = '';
    document.getElementById('newDescription').value = '';
    document.getElementById('newFeatures').value = '';
    document.getElementById('newIsHit').checked = false;
    document.getElementById('newEmoji').value = '🎁';
    
    showToast(`✅ Товар "${name}" додано!`);
  }

  // Редагування товару
  let editingId = null;
  function openEditModal(id) {
    const product = products.find(p => p.id === id);
    if (!product) return;
    editingId = id;
    
    const container = document.getElementById('editFormContainer');
    container.innerHTML = `
      <div class="modal-form-group">
        <label><i class="fas fa-image"></i> Емодзі</label>
        <input type="text" id="editEmoji" value="${product.emoji}">
      </div>
      <div class="modal-form-group">
        <label><i class="fas fa-tag"></i> Назва товару</label>
        <input type="text" id="editName" value="${product.name.replace(/"/g, '&quot;')}">
      </div>
      <div class="modal-form-group">
        <label><i class="fas fa-dollar-sign"></i> Звичайна ціна (грн)</label>
        <input type="number" id="editPrice" value="${product.price}">
      </div>
      <div class="modal-form-group">
        <label><i class="fas fa-percent"></i> Акційна ціна (грн)</label>
        <input type="number" id="editOldPrice" value="${product.oldPrice || ''}">
      </div>
      <div class="modal-form-group">
        <label><i class="fas fa-list"></i> Категорія</label>
        <select id="editCategory">
          <option value="costumes" ${product.category === 'costumes' ? 'selected' : ''}>🦸 Костюми</option>
          <option value="gifts" ${product.category === 'gifts' ? 'selected' : ''}>🎁 Подарунки</option>
          <option value="birthday" ${product.category === 'birthday' ? 'selected' : ''}>🎂 День народження</option>
          <option value="decor" ${product.category === 'decor' ? 'selected' : ''}>🎊 Декор</option>
          <option value="edible" ${product.category === 'edible' ? 'selected' : ''}>🍬 Їстівні букети</option>
          <option value="balloons" ${product.category === 'balloons' ? 'selected' : ''}>🎈 Шари</option>
        </select>
      </div>
      <div class="modal-form-group" style="display:flex; align-items:center; gap:12px;">
        <label>🔥 Хіт продажу</label>
        <input type="checkbox" id="editIsHit" ${product.isHit ? 'checked' : ''}>
      </div>
      <div class="modal-form-group">
        <label><i class="fas fa-align-left"></i> Опис товару</label>
        <textarea id="editDescription" rows="4">${product.description || ''}</textarea>
      </div>
      <div class="modal-form-group">
        <label><i class="fas fa-list-ul"></i> Характеристики (через кому)</label>
        <textarea id="editFeatures" rows="3">${product.features ? product.features.join(', ') : ''}</textarea>
      </div>
      <button class="modal-save-btn" id="saveEditBtn"><i class="fas fa-save"></i> Зберегти зміни</button>
    `;
    
    document.getElementById('saveEditBtn').addEventListener('click', () => {
      const index = products.findIndex(p => p.id === editingId);
      if (index !== -1) {
        const featuresStr = document.getElementById('editFeatures').value;
        products[index] = {
          id: editingId,
          name: document.getElementById('editName').value,
          price: parseInt(document.getElementById('editPrice').value) || 0,
          oldPrice: document.getElementById('editOldPrice').value ? parseInt(document.getElementById('editOldPrice').value) : null,
          emoji: document.getElementById('editEmoji').value || '🎁',
          category: document.getElementById('editCategory').value,
          isHit: document.getElementById('editIsHit').checked,
          description: document.getElementById('editDescription').value,
          features: featuresStr ? featuresStr.split(',').map(f => f.trim()).filter(f => f) : []
        };
      }
      saveProducts();
      renderProductsTable();
      document.getElementById('editModal').classList.remove('active');
      showToast('✅ Товар оновлено!');
    });
    
    document.getElementById('editModal').classList.add('active');
  }

  // Пошук
  function setupSearch() {
    const searchInput = document.getElementById('searchProducts');
    const searchBtn = document.getElementById('searchBtn');
    
    searchBtn.addEventListener('click', () => {
      searchQuery = searchInput.value;
      renderProductsTable();
    });
    
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchQuery = searchInput.value;
        renderProductsTable();
      }
    });
  }

  // ЛОГІН
  function showLoginModal() {
    const modal = document.createElement('div');
    modal.className = 'login-modal';
    modal.innerHTML = `
      <div class="login-box">
        <h2><i class="fas fa-user-shield"></i> Вхід в адмінку</h2>
        <input type="text" id="loginUsername" placeholder="Логін" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button class="login-btn" id="doLoginBtn">Увійти</button>
        <div id="loginError" class="error-msg"></div>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('doLoginBtn').onclick = () => {
      const login = document.getElementById('loginUsername').value;
      const pwd = document.getElementById('loginPassword').value;
      if (login === '1111' && pwd === '1111') {
        isLoggedIn = true;
        modal.remove();
        document.getElementById('adminContainer').style.display = 'block';
        loadProducts();
        renderProductsTable();
        showToast('Вхід виконано! Ласкаво просимо в адмін-панель');
      } else {
        document.getElementById('loginError').textContent = 'Невірний логін або пароль';
      }
    };
  }

  // Перехід на головну
  function goToHome() {
    window.location.href = 'index.html';
  }

  function goBack() {
    window.history.back();
  }

  // Ініціалізація
  document.addEventListener('DOMContentLoaded', () => {
    showLoginModal();
    
    document.getElementById('addProductBtn').addEventListener('click', addProduct);
    document.getElementById('goToSiteBtn').addEventListener('click', goToHome);
    document.getElementById('backHomeBtn').addEventListener('click', goBack);
    
    setupSearch();
    
    const modal = document.getElementById('editModal');
    document.querySelector('.modal-close').addEventListener('click', () => {
      modal.classList.remove('active');
    });
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('active');
    });
  });
</script>
</body>
</html>
